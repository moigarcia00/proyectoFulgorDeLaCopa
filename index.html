<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fulgor de la Copa</title>
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/footer.css" />
  </head>
  <body>
    <header>
      <nav id="worldNavbar"></nav>
    </header>
    <main>
      <img
        class="iconMundial"
        src="img/worldCupIcon.png"
        alt="Logo of the World Cup trophy from the website Fulgor de la Copa"
      />
      <h1 class="heroTitle">¡El mundo entra en ebullición!</h1>

      <p class="heroSubtitle">
        Vive la Copa como nunca antes, el epicentro digital del torneo más
        grande de la historia. Sigue a tus equipos en tiempo real y descubre los secretos de cada sede.
      </p>

      <div class="heroStats">
        <div class="heroStat">
          <span class="heroStatNumber">48</span>
          <span class="heroStatLabel">Selecciones</span>
        </div>
        <div class="heroStatDivider"></div>
        <div class="heroStat">
          <span class="heroStatNumber">3</span>
          <span class="heroStatLabel">Países anfitriones</span>
        </div>
        <div class="heroStatDivider"></div>
        <div class="heroStat">
          <span class="heroStatNumber">2026</span>
          <span class="heroStatLabel">Edición</span>
        </div>
      </div>

      <p class="heroTagline">¡Siente el fulgor, vive la gloria!</p>
      <img
        class="imgIndex"
        src="img/imgIndex.png"
        alt="Image of the different flags of the World Cup"
      />
    </main>
    <footer id="footer-placeholder"></footer>

    <div class="vignette"></div>
    <script src="js/nav.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
