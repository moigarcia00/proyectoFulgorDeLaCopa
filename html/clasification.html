<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificación Mundial 2026</title>
  
    <link rel="stylesheet" href="../css/clasification.css">
    <link rel="stylesheet" href="../css/nav.css"/>
    <link rel="stylesheet" href="../css/footer.css"/>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav id="worldNavbar"></nav>
    <header style="text-align: center; padding: 20px 20px 0 20px;">
        <h1 style="font-size: 28px; margin: 10px 0; color: #d19a23; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">
            FASE DE GRUPOS - MUNDIAL 2026
        </h1>
       
        <div class="info-banner">
            <div class="info-item">
                <span class="qualified-indicator"></span>
                <span>Zonas de Clasificación (1° y 2° Lugar)</span>
            </div>
            <div class="info-item">
                <div class="legend-dots">
                    <span class="dot-legend win"></span> Gana
                    <span class="dot-legend draw"></span> Empata
                    <span class="dot-legend loss"></span> Pierde
                    <span class="dot-legend none"></span> Por Jugar
                </div>
            </div>
            <div class="info-item" style="color: #b4975a; font-weight: bold;">
              
            </div>
        </div>
   

    </header>
    
    <main id="groups-container" class="groups-container"></main>
    <footer id="footer-placeholder"></footer>
    <script src="../js/clasification.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/footer.js"></script>

    <div class="floating-sidebar">
        <h3>GLOSARIO</h3>
        <hr class="gold-divider">
        <div class="sidebar-item"><strong>PJ</strong> = Partidos Jugados</div>
        <div class="sidebar-item"><strong>G</strong> = Ganados</div>
        <div class="sidebar-item"><strong>E</strong> = Empates</div>
        <div class="sidebar-item"><strong>P</strong> = Perdidos</div>
        <div class="sidebar-item"><strong>GF</strong> = Goles a Favor</div>
        <div class="sidebar-item"><strong>GC</strong> = Goles en Contra</div>
        <div class="sidebar-item"><strong>DG</strong> = Diferencia de Goles</div>
        <div class="sidebar-item"><strong>PCD</strong> = Puntos Conducta Deportiva</div>
        <div class="sidebar-item"><strong>Pts</strong> = Puntos Totales</div>
    </div>
    
</body>
</html>
