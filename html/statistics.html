<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fulgor de la Copa</title>
    <link rel="stylesheet" href="../css/index.css" />
    <link rel="stylesheet" href="../css/nav.css" />
    <link rel="stylesheet" href="../css/footer.css" />
    <link rel="stylesheet" href="../css/statistics.css"/>
  </head>
  <body>
    <nav id="worldNavbar"></nav>
    <header>
    <div class="stadium-light left"></div>
    <div class="stadium-light right"></div>
    <div class="stadium-silhouette"></div>

    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>

    <h1>Estadisticas del Torneo</h1>
    
    <div class="selector">
      <button type="button" class="left" data-stat="teamScorer">Equipo Max. Goleador</button>
      <button type="button" class="center" data-stat="playerScorer">Jugador Max. Goleador</button>
      <button type="button" class="right" data-stat="teamConceded">Equipo Max. Encajados</button>
    </div>

    </header>

    <div class="stats-modal" id="statsModal">
      <div class="stats-modal-content">
        <button type="button" class="stats-modal-close" id="statsModalClose" aria-label="Cerrar">&times;</button>
        <h2 id="statsModalTitle"></h2>
        <div class="stats-table-wrapper">
          <table class="stats-table">
            <thead id="statsTableHead"></thead>
            <tbody id="statsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
    
    <footer id="footer-placeholder"></footer>

    <div class="vignette"></div>
    <script src="../js/nav.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../js/statistics.js"></script>
  </body>
</html>
